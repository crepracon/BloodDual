<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#14161a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Blood Dual">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Blood Dual — Duel Scorekeeper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --steel: #14161a;
    --steel-panel: #1c1f25;
    --parchment: #f7f3ea;
    --parchment-dim: #eae4d5;
    --brass: #c9a648;
    --blood: #c0392b;
    --hairline: rgba(237, 230, 214, 0.14);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    background: var(--steel);
    color: var(--parchment);
    font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--hairline);
  }
  .app-title {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.22em;
    color: var(--brass);
    text-transform: uppercase;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--parchment-dim);
  }
  .hp-setting { display: flex; align-items: center; gap: 6px; }
  .hp-setting input {
    width: 52px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--hairline);
    border-radius: 5px;
    color: var(--parchment);
    font-family: inherit;
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    padding: 3px 2px;
  }
  .hp-setting input:focus-visible { outline: 2px solid var(--brass); outline-offset: 1px; }

  /* ---------- Round tracker ---------- */
  .rounds {
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 1px solid var(--hairline);
    background: var(--steel-panel);
    padding: 8px 12px;
  }
  .round {
    font-family: 'Cinzel', serif;
    font-size: clamp(28px, 7vw, 38px);
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brass);
    text-align: center;
  }

  /* ---------- Fighter panels ---------- */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
  }

  /* Guild crest sitting on the seam between the two fighters */
  .logo-spot {
    position: absolute;
    left: 50%;
    top: clamp(120px, 34vw, 210px);
    transform: translate(-50%, -50%);
    width: clamp(104px, 30vw, 165px);
    z-index: 5;
    pointer-events: none;   /* never blocks taps on the panels beneath */
  }
  .logo-spot img {
    display: block;
    width: 100%;
    height: auto;
    filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.55));
  }

  .fighter {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 10px;
    padding: 18px 10px 20px;
    position: relative;
    overflow: hidden;
    transition: filter 200ms ease;
    background: linear-gradient(180deg, var(--deep), color-mix(in srgb, var(--deep) 50%, black));
  }
  .fighter.down { filter: grayscale(0.7) brightness(0.7); }
  .hp.zero { color: #e0555b; }

  .fighter::after {   /* hit flash */
    content: "";
    position: absolute;
    inset: 0;
    background: var(--parchment);
    opacity: 0;
    pointer-events: none;
  }
  .fighter.flash::after { animation: flash 260ms ease-out; }
  @keyframes flash { from { opacity: 0.4; } to { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) {
    .fighter.flash::after { animation: none; }
  }

  .double-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--parchment-dim);
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(247, 243, 234, 0.22);
    border-radius: 20px;
    padding: 6px 12px;
    cursor: pointer;
    margin-top: 2px;
  }
  .double-btn:active { background: rgba(0,0,0,0.5); }
  .double-btn:focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }
  .double-btn:disabled { opacity: 0.35; pointer-events: none; }
  .double-dots { display: inline-flex; gap: 4px; }
  .double-dots .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(247, 243, 234, 0.25);
    display: inline-block;
  }
  .double-dots .dot.filled { background: var(--brass); }

  .fighter input.name {
    background: transparent;
    border: none;
    border-bottom: 1px dashed rgba(247, 243, 234, 0.35);
    color: var(--parchment);
    font-family: inherit;
    font-size: clamp(24px, 6.5vw, 33px);
    font-weight: 600;
    text-align: center;
    width: 92%;
    max-width: 260px;
    padding: 2px 4px;
    letter-spacing: 0.04em;
  }
  .fighter input.name:focus {
    outline: 2px solid var(--brass);
    outline-offset: 2px;
    border-bottom-color: transparent;
  }
  .fighter input.name::placeholder { color: var(--parchment-dim); opacity: 0.7; }

  .hp {
    font-size: clamp(56px, 17vw, 120px);
    font-weight: 700;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .hp-label {
    font-size: 16px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--parchment-dim);
    margin-top: -4px;
  }

  .hp-bar {
    width: 90%;
    max-width: 260px;
    height: 12px;
    border-radius: 6px;
    background: rgba(0,0,0,0.45);
    overflow: hidden;
    margin: 4px 0 2px;
  }
  .hp-bar .fill {
    height: 100%;
    border-radius: 6px;
    transition: width 200ms ease, background-color 200ms ease;
  }

  .wounds {
    font-size: 17.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--parchment-dim);
    min-height: 18px;
    margin-bottom: 4px;
    white-space: nowrap;
    max-width: 96%;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .wounds .bleeding { color: #f08a7e; font-weight: 700; }

  /* Hit buttons */
  .hits { display: flex; flex-direction: column; gap: 10px; width: 94%; max-width: 280px; margin-top: 2px; }
  .hit {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;          /* bleed tag drops to a 2nd line if it can't fit */
    row-gap: 3px;
    overflow: hidden;         /* hard guarantee: nothing escapes the box */
    gap: clamp(5px, 1.6vw, 9px);
    min-width: 0;
    font-family: inherit;
    font-size: clamp(14px, 4.2vw, 23px);
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--parchment);
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(247, 243, 234, 0.22);
    border-radius: 8px;
    padding: 12px clamp(8px, 2.6vw, 15px);
    cursor: pointer;
  }
  .hit:active { background: rgba(0,0,0,0.55); }
  .hit:focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }
  .hit .dmg { color: var(--bright); font-weight: 700; font-size: clamp(15px, 4.6vw, 25px); }
  .hit .bleed-tag {
    margin-left: auto;
    flex-shrink: 0;
    font-size: clamp(11px, 3.1vw, 14.5px);
    letter-spacing: 0.02em;
    color: var(--parchment-dim);
    font-weight: 500;
    white-space: nowrap;
  }
  .fighter.down .hit { pointer-events: none; opacity: 0.5; }

  /* ---------- Verdict banner ---------- */
  .verdict {
    display: none;
    text-align: center;
    padding: 10px 14px;
    font-family: 'Cinzel', serif;
    font-size: clamp(20px, 5.5vw, 26px);
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--brass);
    background: rgba(201, 166, 72, 0.08);
    border-top: 1px solid rgba(201, 166, 72, 0.35);
  }
  .verdict.show { display: block; }

  /* ---------- Swatch strip ---------- */
  .swatch-strip {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    background: var(--steel-panel);
    border-top: 1px solid var(--hairline);
    padding: 10px 12px;
  }
  .swatches { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; align-content: center; }
  .swatch {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.35);
    cursor: pointer;
    padding: 0;
  }
  .swatch.active { border-color: var(--parchment); box-shadow: 0 0 0 2px rgba(0,0,0,0.4); }
  .swatch:focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }

  /* ---------- Controls ---------- */
  .controls {
    display: grid;
    grid-template-columns: 0.8fr 1.2fr 1fr;
    gap: 10px;
    padding: 12px 14px;
    border-top: 1px solid var(--hairline);
    background: var(--steel-panel);
  }
  .controls.top-controls {
    border-top: none;
    border-bottom: 1px solid var(--hairline);
  }
  button.ctl {
    font-family: inherit;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 13px 6px;
    border-radius: 6px;
    border: 1px solid rgba(247, 243, 234, 0.22);
    background: transparent;
    color: var(--parchment);
    cursor: pointer;
    white-space: nowrap;
  }
  button.ctl:active { background: rgba(237,230,214,0.08); }
  button.ctl:focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }
  button.ctl:disabled { opacity: 0.4; pointer-events: none; }

  .next-btn {
    background: var(--brass);
    border-color: var(--brass);
    color: #1a1508;
  }
  .next-btn:active { filter: brightness(0.9); }

  /* ---------- Per-fighter hit log ---------- */
  .hit-log {
    list-style: none;
    width: 94%;
    max-width: 280px;
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .hit-log li {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--parchment);
    border-bottom: 1px dotted rgba(247, 243, 234, 0.16);
    padding: 4px 2px;
  }
  .hit-log .bleed-txt { color: #f08a7e; }
  .hit-log .rnd {
    color: var(--parchment-dim);
    opacity: 0.5;
    font-size: 13.5px;
    letter-spacing: 0.14em;
    font-weight: 500;
  }

  /* ---------- Fight history drawer ---------- */
  .history-drawer {
    border-top: 1px solid var(--hairline);
    background: var(--steel-panel);
  }
  .history-toggle {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--parchment-dim);
    background: none;
    border: none;
    padding: 12px 10px;
    cursor: pointer;
  }
  .history-toggle:active { color: var(--brass); }
  .history-toggle:focus-visible { outline: 2px solid var(--brass); outline-offset: -2px; }
  .history-toggle .chev { transition: transform 160ms ease; font-size: 13px; }
  .history-toggle[aria-expanded="true"] .chev { transform: rotate(180deg); }
  .history-panel {
    max-height: 42vh;
    overflow-y: auto;
    padding: 0 14px 12px;
  }
  .history-empty {
    text-align: center;
    color: var(--parchment-dim);
    opacity: 0.7;
    font-size: 15px;
    padding: 8px 0 14px;
  }
  .history-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .history-entry {
    background: rgba(0,0,0,0.28);
    border: 1px solid var(--hairline);
    border-radius: 8px;
    padding: 9px 12px;
  }
  .history-entry .h-verdict {
    font-family: 'Cinzel', serif;
    font-size: 14.5px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--brass);
  }
  .history-entry .h-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 3px;
    font-size: 15.5px;
    color: var(--parchment);
  }
  .history-entry .h-score {
    font-variant-numeric: tabular-nums;
    color: var(--parchment-dim);
  }
  .history-entry .h-sub {
    margin-top: 2px;
    font-size: 12.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--parchment-dim);
    opacity: 0.6;
  }

  /* ---------- Mode tabs ---------- */
  .mode-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--steel-panel);
    border-bottom: 1px solid var(--hairline);
  }
  .mode-tab {
    font-family: 'Cinzel', serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--parchment-dim);
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 10px 4px;
    cursor: pointer;
  }
  .mode-tab + .mode-tab { border-left: 1px solid var(--hairline); }
  .mode-tab.active { color: var(--brass); border-bottom-color: var(--brass); }
  .mode-tab:focus-visible { outline: 2px solid var(--brass); outline-offset: -2px; }

  .tourn-banner {
    text-align: center;
    font-size: 14px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--brass);
    background: rgba(201, 166, 72, 0.08);
    border-bottom: 1px solid rgba(201, 166, 72, 0.35);
    padding: 7px 10px;
  }

  /* ---------- Tournament view ---------- */
  .tourn { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
  .tourn[hidden] { display: none; }
  .t-card {
    background: var(--steel-panel);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 14px;
  }
  .t-card h2 {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 10px;
  }
  .t-addrow { display: flex; gap: 8px; }
  .t-addrow input {
    flex: 1;
    min-width: 0;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--hairline);
    border-radius: 6px;
    color: var(--parchment);
    font-family: inherit;
    font-size: 18px;
    padding: 10px 12px;
  }
  .t-addrow input:focus-visible { outline: 2px solid var(--brass); }
  .t-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .t-chip {
    display: flex; align-items: center; gap: 4px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--hairline);
    border-radius: 16px;
    padding: 6px 6px 6px 13px;
    font-size: 17px; font-weight: 600;
  }
  .t-chip button {
    background: none; border: none;
    color: var(--parchment-dim);
    font-size: 17px; cursor: pointer; padding: 0 7px;
  }
  .t-typerow { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  .t-label { font-size: 14px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--parchment-dim); }
  .t-types { display: flex; gap: 8px; }
  .t-type {
    font-family: inherit; font-size: 16px; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase;
    padding: 8px 12px; border-radius: 6px;
    border: 1px solid var(--hairline);
    background: transparent; color: var(--parchment); cursor: pointer;
  }
  .t-type.active { background: var(--brass); border-color: var(--brass); color: #1a1508; }

  .t-table { width: 100%; border-collapse: collapse; }
  .t-table th {
    font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--parchment-dim); text-align: left;
    padding: 4px 6px; border-bottom: 1px solid var(--hairline);
  }
  .t-table td { font-size: 18px; padding: 9px 6px; border-bottom: 1px dotted rgba(247,243,234,0.14); }
  .t-table td.num { font-variant-numeric: tabular-nums; font-weight: 700; text-align: right; }
  .t-table tr.t-playerrow { cursor: pointer; }
  .t-table td.t-stats {
    font-size: 14.5px; color: var(--parchment-dim);
    letter-spacing: 0.03em; padding-top: 2px;
  }

  .t-pair {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 2px;
    border-bottom: 1px dotted rgba(247,243,234,0.14);
    font-size: 18px;
  }
  .t-pair:last-child { border-bottom: none; }
  .t-vs { color: var(--parchment-dim); font-size: 13px; letter-spacing: 0.1em; }
  .t-res { margin-left: auto; font-weight: 700; font-variant-numeric: tabular-nums; }
  .t-fight {
    font-family: inherit; font-size: 15px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 9px 15px; border-radius: 6px;
    border: 1px solid var(--brass);
    background: var(--brass); color: #1a1508; cursor: pointer;
    flex: 0 0 auto;
  }
  .t-pair .t-fight { margin-left: auto; }
  .t-selects { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
  .t-selects select {
    flex: 1; min-width: 110px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--hairline);
    border-radius: 6px;
    color: var(--parchment);
    font-family: inherit; font-size: 17px;
    padding: 9px 10px;
  }
  .t-empty { color: var(--parchment-dim); font-size: 16px; }
</style>
</head>
<body>

<header>
  <div class="app-title">Blood Dual</div>
  <div class="header-right">
    <label class="hp-setting" for="hpStart">Start HP
      <input type="number" id="hpStart" value="20" min="1" max="99" inputmode="numeric">
    </label>
    <div>Fight <span id="fightNum">1</span></div>
  </div>
</header>

<nav class="mode-tabs">
  <button class="mode-tab" data-mode="duel">Duel</button>
  <button class="mode-tab" data-mode="tourn">Tournament</button>
</nav>

<div class="tourn-banner duel-ui" id="tournBanner" hidden></div>

<nav class="rounds duel-ui" id="roundBar" aria-label="Round tracker"></nav>

<div class="controls duel-ui top-controls">
  <button class="ctl" id="undoBtn" disabled>Undo</button>
  <button class="ctl next-btn" id="nextBtn">Next round</button>
  <button class="ctl" id="newBtn">New fight</button>

  <section class="fighter" id="panelA" aria-label="Fighter one">
    <button class="double-btn" id="doubleA" type="button" aria-label="Doubling out strike">
      Doubling Out <span class="double-dots" id="doubleDotsA"></span>
    </button>
    <input class="name" id="nameA" type="text" placeholder="Fighter name" autocomplete="off">
    <div class="hp" id="hpA">20</div>
    <div class="hp-label">Health</div>
    <div class="hp-bar"><div class="fill" id="barA"></div></div>
    <div class="wounds" id="woundsA">Unwounded</div>
    <div class="hits">
      <button class="hit" data-side="a" data-loc="head">
        <span>Head</span><span class="dmg">−3</span>
        <span class="bleed-tag">Bleed −2/rd</span>
      </button>
      <button class="hit" data-side="a" data-loc="chest">
        <span>Chest</span><span class="dmg">−2</span>
        <span class="bleed-tag">Bleed −1/rd</span>
      </button>
      <button class="hit" data-side="a" data-loc="limb">
        <span>Limb</span><span class="dmg">−1</span>
        <span class="bleed-tag">No bleed</span>
      </button>
    </div>
    <ol class="hit-log" id="hitLogA"></ol>
  </section>

  <section class="fighter" id="panelB" aria-label="Fighter two">
    <button class="double-btn" id="doubleB" type="button" aria-label="Doubling out strike">
      Doubling Out <span class="double-dots" id="doubleDotsB"></span>
    </button>
    <input class="name" id="nameB" type="text" placeholder="Fighter name" autocomplete="off">
    <div class="hp" id="hpB">20</div>
    <div class="hp-label">Health</div>
    <div class="hp-bar"><div class="fill" id="barB"></div></div>
    <div class="wounds" id="woundsB">Unwounded</div>
    <div class="hits">
      <button class="hit" data-side="b" data-loc="head">
        <span>Head</span><span class="dmg">−3</span>
        <span class="bleed-tag">Bleed −2/rd</span>
      </button>
      <button class="hit" data-side="b" data-loc="chest">
        <span>Chest</span><span class="dmg">−2</span>
        <span class="bleed-tag">Bleed −1/rd</span>
      </button>
      <button class="hit" data-side="b" data-loc="limb">
        <span>Limb</span><span class="dmg">−1</span>
        <span class="bleed-tag">No bleed</span>

  <div class="swatches" id="swatchesB" role="group" aria-label="Choose fighter two's color"></div>
</div>

<div class="history-drawer duel-ui">
  <button class="history-toggle" id="historyToggle" aria-expanded="false">
    <span>Fight History</span>
    <span class="chev" id="historyChev">▾</span>
  </button>
  <div class="history-panel" id="historyPanel" hidden>
    <ol class="history-list" id="historyList"></ol>
  </div>
</div>

<div id="tournView" class="tourn" hidden>
  <section class="t-card">
    <h2>Players</h2>
    <div class="t-addrow">
      <input id="tPlayerName" type="text" placeholder="Player name" autocomplete="off">
      <button class="t-fight" id="tAddBtn">Add</button>
    </div>
    <div class="t-chips" id="tChips"></div>
    <div class="t-typerow">
      <span class="t-label">Format</span>
      <div class="t-types">
        <button class="t-type" data-type="rr">Round robin</button>
        <button class="t-type" data-type="free">Free bouts</button>
      </div>
    </div>
  </section>

  <section class="t-card">
    <h2>Standings</h2>
    <div id="tStandings"></div>
  </section>

  <section class="t-card">
    <h2>Bouts</h2>
    <div id="tBouts"></div>
  </section>

  <section class="t-card">
    <button class="ctl" id="tResetBtn">Reset scores</button>
  </section>
</div>

<script>
(function () {
  // Wound rules: [immediate damage, bleed per round]
  const WOUNDS = {
    head:  { label: "Head",  dmg: 3, bleed: 2 },
    chest: { label: "Chest", dmg: 2, bleed: 1 },
    limb:  { label: "Limb",  dmg: 1, bleed: 0 }
  };

  // Eight fighter colors: [name, deep panel color, bright accent]
  const COLORS = [
    ["Crimson", "#8e2b33", "#e0555b"],
    ["Cobalt",  "#24425e", "#5a9bd9"],
    ["Forest",  "#2b5232", "#5cc06a"],
    ["Amber",   "#7a5a1a", "#e0b34e"],
    ["Violet",  "#4a2b5e", "#a06ad9"],
    ["Teal",    "#1d4a4a", "#4ac0bd"],
    ["Ember",   "#6e3a1d", "#e07f45"],
    ["Slate",   "#3a3f4a", "#9aa4b5"]
  ];

  const HISTORY_CAP = 20;   // fight-history drawer keeps only the most recent N fights

  const state = {
    hpStart: 20,
    fight: 1,
    round: 1,
    over: false,
    a: { hp: 20, color: 0, head: 0, chest: 0, limb: 0 },
    b: { hp: 20, color: 1, head: 0, chest: 0, limb: 0 },
    undo: [],   // snapshots taken before each action
    log: [],    // current fight's blows: { type: "hit"|"bleed", side, dmg, round }
    doubleCount: 0,    // shared "doubling out" strike count, resets each round (0-3)
    fightHistory: [],  // completed fights, newest first, capped at HISTORY_CAP
    mode: "duel",          // "duel" | "tourn"
    tournBout: null,       // { aId, bId } while a tournament bout is on the board
    returnPending: false,  // bout recorded, offer "Back to tournament"
    tourn: { type: "rr", players: [], bouts: [], nextId: 1 }
  };

  const $ = (id) => document.getElementById(id);
  const els = {
    hpA: $("hpA"), hpB: $("hpB"),
    barA: $("barA"), barB: $("barB"),
    woundsA: $("woundsA"), woundsB: $("woundsB"),
    nameA: $("nameA"), nameB: $("nameB"),
    panelA: $("panelA"), panelB: $("panelB"),
    fightNum: $("fightNum"), hpStart: $("hpStart"),
    roundBar: $("roundBar"), verdict: $("verdict"),
    undoBtn: $("undoBtn"), nextBtn: $("nextBtn"),
    hitLogA: $("hitLogA"), hitLogB: $("hitLogB"),
    tournBanner: $("tournBanner"), tournView: $("tournView"),
    historyToggle: $("historyToggle"), historyPanel: $("historyPanel"), historyList: $("historyList"),
    doubleDotsA: $("doubleDotsA"), doubleDotsB: $("doubleDotsB")
  };
  const newBtn = $("newBtn");
  let newArmTimer = null;

  const panel = (side) => side === "a" ? els.panelA : els.panelB;
  const nameOf = (side) =>
    (side === "a" ? els.nameA : els.nameB).value.trim() ||
    (side === "a" ? "Fighter one" : "Fighter two");
  const brightOf = (side) => COLORS[state[side].color][2];
  const bleedOf = (f) => f.head * WOUNDS.head.bleed + f.chest * WOUNDS.chest.bleed;

  /* ---------- Undo snapshots ---------- */
  function snapshot() {
    state.undo.push({
      aHp: state.a.hp, bHp: state.b.hp,
      aH: state.a.head, aC: state.a.chest, aL: state.a.limb,
      bH: state.b.head, bC: state.b.chest, bL: state.b.limb,
      round: state.round, over: state.over,
      logLen: state.log.length
    });
    if (state.undo.length > 100) state.undo.shift();
  }

  els.undoBtn.addEventListener("click", () => {
    const s = state.undo.pop();
    if (!s) return;
    state.a.hp = s.aHp; state.b.hp = s.bHp;
    state.a.head = s.aH; state.a.chest = s.aC; state.a.limb = s.aL;
    state.b.head = s.bH; state.b.chest = s.bC; state.b.limb = s.bL;
    state.round = s.round;
    state.over = s.over;
    state.log.length = s.logLen;
    els.verdict.classList.remove("show");
    renderLog();
    render();
  });

  /* ---------- Colors ---------- */
  function applyColor(side) {
    const [, deep, bright] = COLORS[state[side].color];
    const p = panel(side);
    p.style.setProperty("--deep", deep);
    p.style.setProperty("--bright", bright);
    document.querySelectorAll("#swatches" + side.toUpperCase() + " .swatch")
      .forEach((s, i) => s.classList.toggle("active", i === state[side].color));
    save();
  }

  function buildSwatches(side) {
    const wrap = $("swatches" + side.toUpperCase());
    COLORS.forEach(([label, deep], i) => {
      const b = document.createElement("button");
      b.className = "swatch";
      b.style.background = deep;
      b.setAttribute("aria-label", label);
      b.title = label;
      b.addEventListener("click", () => {
        state[side].color = i;
        applyColor(side);
      });
      wrap.appendChild(b);
    });
  }
  buildSwatches("a"); buildSwatches("b");

  /* ---------- Render ---------- */
  function woundText(f) {
    const parts = [];
    if (f.head)  parts.push(f.head + " Head");
    if (f.chest) parts.push(f.chest + " Chest");
    if (f.limb)  parts.push(f.limb + " Limb");
    if (!parts.length) return "Unwounded";
    const bleed = bleedOf(f);
    return parts.join(" \u00b7 ") +
      (bleed ? ' \u00b7 <span class="bleeding">Bleed \u2212' + bleed + "/rd</span>" : "");
  }

  function render() {
    els.hpA.textContent = state.a.hp;
    els.hpB.textContent = state.b.hp;
    const fracA = state.a.hp / state.hpStart;
    const fracB = state.b.hp / state.hpStart;
    els.barA.style.width = (fracA * 100) + "%";
    els.barB.style.width = (fracB * 100) + "%";
    // Green at full health, through amber, to red near death
    els.barA.style.backgroundColor = "hsl(" + Math.round(fracA * 115) + ", 70%, 45%)";
    els.barB.style.backgroundColor = "hsl(" + Math.round(fracB * 115) + ", 70%, 45%)";
    els.woundsA.innerHTML = woundText(state.a);
    els.woundsB.innerHTML = woundText(state.b);
    els.fightNum.textContent = state.fight;
    els.panelA.classList.toggle("down", state.over);
    els.panelB.classList.toggle("down", state.over);
    els.hpA.classList.toggle("zero", state.a.hp <= 0);
    els.hpB.classList.toggle("zero", state.b.hp <= 0);
    els.undoBtn.disabled = state.undo.length === 0;
    els.nextBtn.disabled = state.over;

    // Doubling Out: shared 3-dot strike tracker, filled dots = strikes so far
    const dotsHtml = [0, 1, 2].map((i) =>
      "<span class='dot" + (i < state.doubleCount ? " filled" : "") + "'></span>").join("");
    els.doubleDotsA.innerHTML = dotsHtml;
    els.doubleDotsB.innerHTML = dotsHtml;
    document.querySelectorAll(".double-btn").forEach((btn) => { btn.disabled = state.over; });

    if (state.returnPending) newBtn.textContent = "Back to tournament";
    else if (state.tournBout) newBtn.textContent = "End bout";
    else newBtn.textContent = "New fight";
    els.tournBanner.hidden = !state.tournBout;
    if (state.tournBout) {
      els.tournBanner.textContent = "Tournament bout \u2014 " +
        tPlayerName(state.tournBout.aId) + " vs " + tPlayerName(state.tournBout.bId);
    }

    // Single large round indicator
    els.roundBar.innerHTML = "";
    const chip = document.createElement("div");
    chip.className = "round";
    chip.textContent = "Round " + state.round;
    els.roundBar.appendChild(chip);

    save();
  }

  function flash(side) {
    const p = panel(side);
    p.classList.remove("flash");
    void p.offsetWidth;
    p.classList.add("flash");
  }

  /* ---------- Record ---------- */
  function pushLog(entry) {
    state.log.push(entry);
    renderLog();
  }

  function renderLog() {
    ["a", "b"].forEach((side) => {
      const list = side === "a" ? els.hitLogA : els.hitLogB;
      list.innerHTML = "";
      [...state.log].filter((e) => e.side === side).reverse().forEach((e) => {
        const li = document.createElement("li");
        const what = document.createElement("span");
        if (e.type === "bleed") {
          what.className = "bleed-txt";
          what.textContent = "Bleed \u2212" + e.dmg;
        } else {
          what.textContent = WOUNDS[e.loc].label + " \u2212" + e.dmg;
        }
        const rnd = document.createElement("span");
        rnd.className = "rnd";
        rnd.textContent = "Round " + e.round;
        li.append(what, rnd);
        list.appendChild(li);
      });
    });
    save();
  }

  /* ---------- Hits ---------- */
  document.querySelectorAll(".hit").forEach((btn) => {
    btn.addEventListener("click", () => {
      if (state.over) return;
      const side = btn.dataset.side;
      const loc = btn.dataset.loc;
      const rule = WOUNDS[loc];
      const f = state[side];

      // A fighter already at 0 HP can't be hit further — no damage,
      // no stat count, no log entry. Prevents phantom entries from
      // taps landing on a downed fighter during a chaotic exchange.
      if (f.hp <= 0) return;

      snapshot();
      f.hp = Math.max(0, f.hp - rule.dmg);   // score caps at 0
      f[loc] += 1;
      flash(side);

      pushLog({
        type: "hit",
        side: side,
        loc: loc,
        dmg: rule.dmg,
        round: state.round
      });

      // The fight does NOT end here even at 0 HP — exchanges are
      // simultaneous, so the opponent's hits this round still count.
      // The fight is settled when Next round is pressed.
      render();
    });
  });

  /* ---------- Next round: settle downed fighters, else advance and bleed ---------- */
  function advanceRound() {
    if (state.over) return;

    // Someone at 0? The round is over and so is the fight —
    // both fighters' final health (capped at 0) stands as recorded.
    if (state.a.hp <= 0 || state.b.hp <= 0) {
      snapshot();
      finishFight();
      return;
    }

    snapshot();
    state.round += 1;
    state.doubleCount = 0;

    ["a", "b"].forEach((side) => {
      const f = state[side];
      const bleed = bleedOf(f);
      if (bleed > 0 && f.hp > 0) {
        f.hp = Math.max(0, f.hp - bleed);
        flash(side);
        pushLog({
          type: "bleed",
          side: side,
          dmg: bleed,
          round: state.round
        });
      }
    });
    // Bleed can drop a fighter to 0, but the new round still plays out —
    // the fight settles at the next "Next round" press.
    render();
  }

  els.nextBtn.addEventListener("click", advanceRound);

  /* ---------- Doubling Out: shared 3-strike counter for simultaneous hits ---------- */
  document.querySelectorAll(".double-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      if (state.over) return;
      state.doubleCount += 1;
      if (state.doubleCount >= 3) {
        // Third double this round — roll straight to the next round.
        // advanceRound() resets doubleCount back to 0 (or settles the
        // fight if someone's already down).
        advanceRound();
      } else {
        render();
      }
    });
  });

  /* ---------- Fight end ---------- */
  function finishFight() {
    const aDown = state.a.hp <= 0;
    const bDown = state.b.hp <= 0;

    state.over = true;
    if (aDown && bDown) {
      els.verdict.textContent = "Both fighters fall \u2014 Draw";
    } else if (aDown || bDown) {
      els.verdict.textContent = "Victory \u2014 " + nameOf(aDown ? "b" : "a");
    } else if (state.a.hp !== state.b.hp) {
      els.verdict.textContent = "Victory \u2014 " + nameOf(state.a.hp > state.b.hp ? "a" : "b");
    } else {
      els.verdict.textContent = "Draw \u2014 " + state.a.hp + "\u2013" + state.b.hp;
    }
    els.verdict.classList.add("show");
    recordHistory(els.verdict.textContent);
    if (state.tournBout) recordTournBout();
    render();
  }

  /* ---------- Fight history ---------- */
  function recordHistory(verdictText) {
    state.fightHistory.unshift({
      verdict: verdictText,
      nameA: nameOf("a"), nameB: nameOf("b"),
      hpA: state.a.hp, hpB: state.b.hp,
      hpStart: state.hpStart, rounds: state.round,
      tournament: !!state.tournBout,
      ts: Date.now()
    });
    if (state.fightHistory.length > HISTORY_CAP) state.fightHistory.length = HISTORY_CAP;
    renderHistory();
  }

  function renderHistory() {
    const list = els.historyList;
    list.innerHTML = "";
    if (!state.fightHistory.length) {
      const empty = document.createElement("div");
      empty.className = "history-empty";
      empty.textContent = "No fights recorded yet.";
      list.appendChild(empty);
      return;
    }
    state.fightHistory.forEach((h) => {
      const li = document.createElement("li");
      li.className = "history-entry";
      const rounds = h.rounds + (h.rounds === 1 ? " round" : " rounds");
      const tag = h.tournament ? " \u00b7 Tournament" : "";
      li.innerHTML =
        "<div class='h-verdict'>" + h.verdict + "</div>" +
        "<div class='h-meta'><span>" + h.nameA + " vs " + h.nameB + "</span>" +
        "<span class='h-score'>" + h.hpA + "\u2013" + h.hpB + "</span></div>" +
        "<div class='h-sub'>" + rounds + tag + "</div>";
      list.appendChild(li);
    });
  }

  els.historyToggle.addEventListener("click", () => {
    const open = els.historyPanel.hidden;
    els.historyPanel.hidden = !open;
    els.historyToggle.setAttribute("aria-expanded", String(open));
  });

  /* ---------- New fight ---------- */
  newBtn.addEventListener("click", () => {
    // Tournament flows first
    if (state.returnPending) {
      state.returnPending = false;
      setMode("tourn");
      render();
      return;
    }
    if (state.tournBout && !state.over) {
      // Time's up: record standing health as the bout result (two-tap confirm)
      if (!newArmTimer) {
        newBtn.textContent = "Tap again to end bout";
        newArmTimer = setTimeout(() => {
          newArmTimer = null;
          render();
        }, 2500);
        return;
      }
      clearTimeout(newArmTimer); newArmTimer = null;
      state.over = true;
      if (state.a.hp > state.b.hp) els.verdict.textContent = "Victory \u2014 " + nameOf("a");
      else if (state.b.hp > state.a.hp) els.verdict.textContent = "Victory \u2014 " + nameOf("b");
      else els.verdict.textContent = "Draw \u2014 " + state.a.hp + "\u2013" + state.b.hp;
      els.verdict.classList.add("show");
      recordHistory(els.verdict.textContent);
      recordTournBout();
      return;
    }

    const touched = state.a.hp < state.hpStart || state.b.hp < state.hpStart || state.round > 1;

    // Mid-fight: require a second tap to confirm instead of a popup
    // (popups are blocked in some sandboxed previews)
    if (!state.over && touched && !newArmTimer) {
      newBtn.textContent = "Tap again to confirm";
      newArmTimer = setTimeout(() => {
        newArmTimer = null;
        newBtn.textContent = "New fight";
      }, 2500);
      return;
    }
    if (newArmTimer) { clearTimeout(newArmTimer); newArmTimer = null; }
    newBtn.textContent = "New fight";

    if (state.over) state.fight += 1;
    state.hpStart = clampHp(els.hpStart.value);
    els.hpStart.value = state.hpStart;
    ["a", "b"].forEach((side) => {
      const f = state[side];
      f.hp = state.hpStart;
      f.head = 0; f.chest = 0; f.limb = 0;
    });
    state.round = 1;
    state.over = false;
    state.undo = [];
    state.log = [];
    state.doubleCount = 0;
    els.verdict.classList.remove("show");
    renderLog();
    render();
  });

  // Reset both fighters' pools and the board for a fresh bout.
  // (Used by tournament bouts; the New fight button does the same inline.)
  function resetPools() {
    state.hpStart = clampHp(els.hpStart.value);
    els.hpStart.value = state.hpStart;
    ["a", "b"].forEach((side) => {
      const f = state[side];
      f.hp = state.hpStart;
      f.head = 0; f.chest = 0; f.limb = 0;
    });
    state.over = false;
    state.undo = [];
    els.verdict.classList.remove("show");
    render();
  }

  function clampHp(v) {
    const n = Math.round(Number(v));
    return isNaN(n) ? 20 : Math.min(99, Math.max(1, n));
  }
  els.hpStart.addEventListener("change", () => {
    els.hpStart.value = clampHp(els.hpStart.value);
  });

  /* ---------- Mode tabs ---------- */
  function setMode(m) {
    state.mode = m;
    document.querySelectorAll(".duel-ui").forEach((el) => {
      el.style.display = m === "duel" ? "" : "none";
    });
    els.tournView.hidden = m !== "tourn";
    document.querySelectorAll(".mode-tab").forEach((t) =>
      t.classList.toggle("active", t.dataset.mode === m));
    if (m === "duel") render();   // re-applies banner visibility inside duel chrome
    if (m === "tourn") renderTourn();
    save();
  }
  document.querySelectorAll(".mode-tab").forEach((t) =>
    t.addEventListener("click", () => setMode(t.dataset.mode)));

  /* ---------- Tournament ---------- */
  const T = state.tourn;
  const tPlayer = (id) => state.tourn.players.find((p) => p.id === id);
  function tPlayerName(id) {
    const p = tPlayer(id);
    return p ? p.name : "(removed)";
  }
  const pairKey = (x, y) => (x < y ? x + ":" + y : y + ":" + x);
  let tOpenStats = null;   // player id with expanded stats row

  $("tAddBtn").addEventListener("click", tAddPlayer);
  $("tPlayerName").addEventListener("keydown", (e) => {
    if (e.key === "Enter") tAddPlayer();
  });
  function tAddPlayer() {
    const inp = $("tPlayerName");
    const name = inp.value.trim();
    if (!name) return;
    if (state.tourn.players.some((p) => p.name.toLowerCase() === name.toLowerCase())) {
      inp.select();
      return;
    }
    state.tourn.players.push({ id: state.tourn.nextId++, name });
    inp.value = "";
    inp.focus();
    renderTourn(); save();
  }

  document.querySelectorAll(".t-type").forEach((btn) =>
    btn.addEventListener("click", () => {
      state.tourn.type = btn.dataset.type;
      renderTourn(); save();
    }));

  let tResetArm = null;
  $("tResetBtn").addEventListener("click", () => {
    if (!state.tourn.bouts.length) return;
    const btn = $("tResetBtn");
    if (!tResetArm) {
      btn.textContent = "Tap again to reset all scores";
      tResetArm = setTimeout(() => { tResetArm = null; btn.textContent = "Reset scores"; }, 2500);
      return;
    }
    clearTimeout(tResetArm); tResetArm = null;
    btn.textContent = "Reset scores";
    state.tourn.bouts = [];
    renderTourn(); save();
  });

  function startTournBout(aId, bId) {
    els.nameA.value = tPlayerName(aId);
    els.nameB.value = tPlayerName(bId);
    state.tournBout = { aId, bId };
    state.returnPending = false;
    state.log = [];
    state.round = 1;
    resetPools();
    renderLog();
    setMode("duel");
  }

  function recordTournBout() {
    const tb = state.tournBout;
    if (!tb) return;
    const hits = state.log.filter((e) => e.type === "hit").map((e) => ({
      victim: e.side === "a" ? tb.aId : tb.bId,
      attacker: e.side === "a" ? tb.bId : tb.aId,
      loc: e.loc, dmg: e.dmg, round: e.round
    }));
    const bleeds = state.log.filter((e) => e.type === "bleed").map((e) => ({
      victim: e.side === "a" ? tb.aId : tb.bId,
      dmg: e.dmg, round: e.round
    }));
    state.tourn.bouts.push({
      aId: tb.aId, bId: tb.bId,
      aHp: state.a.hp, bHp: state.b.hp,
      hits, bleeds
    });
    state.tournBout = null;
    state.returnPending = true;
    state.undo = [];
    renderTourn(); render(); save();
  }

  function tStats(pid) {
    const taken = { head: 0, chest: 0, limb: 0 };
    const dealt = { head: 0, chest: 0, limb: 0 };
    state.tourn.bouts.forEach((b) => (b.hits || []).forEach((h) => {
      if (h.victim === pid) taken[h.loc] += 1;
      if (h.attacker === pid) dealt[h.loc] += 1;
    }));
    return { taken, dealt };
  }

  function renderTourn() {
    // players
    const chips = $("tChips");
    chips.innerHTML = "";
    state.tourn.players.forEach((p) => {
      const chip = document.createElement("span");
      chip.className = "t-chip";
      chip.textContent = p.name;
      const x = document.createElement("button");
      x.textContent = "\u00d7";
      x.setAttribute("aria-label", "Remove " + p.name);
      x.addEventListener("click", () => {
        state.tourn.players = state.tourn.players.filter((q) => q.id !== p.id);
        renderTourn(); save();
      });
      chip.appendChild(x);
      chips.appendChild(chip);
    });

    document.querySelectorAll(".t-type").forEach((btn) =>
      btn.classList.toggle("active", btn.dataset.type === state.tourn.type));

    // standings
    const standings = $("tStandings");
    if (!state.tourn.players.length) {
      standings.innerHTML = '<div class="t-empty">Add at least two players above.</div>';
    } else {
      const rows = state.tourn.players.map((p) => {
        let score = 0, wins = 0, bouts = 0;
        state.tourn.bouts.forEach((b) => {
          if (b.aId === p.id) { score += b.aHp; bouts++; if (b.aHp > b.bHp) wins++; }
          if (b.bId === p.id) { score += b.bHp; bouts++; if (b.bHp > b.aHp) wins++; }
        });
        return { p, score, wins, bouts };
      }).sort((x, y) => y.score - x.score || y.wins - x.wins);

      const table = document.createElement("table");
      table.className = "t-table";
      table.innerHTML = "<tr><th>#</th><th>Player</th><th style='text-align:right'>Score</th>" +
                        "<th style='text-align:right'>W</th><th style='text-align:right'>Bouts</th></tr>";
      rows.forEach((r, i) => {
        const tr = document.createElement("tr");
        tr.className = "t-playerrow";
        tr.innerHTML = "<td>" + (i + 1) + "</td>";
        const nameTd = document.createElement("td");
        nameTd.textContent = r.p.name;
        tr.appendChild(nameTd);
        tr.innerHTML += "<td class='num'>" + r.score + "</td><td class='num'>" + r.wins +
                        "</td><td class='num'>" + r.bouts + "</td>";
        tr.addEventListener("click", () => {
          tOpenStats = tOpenStats === r.p.id ? null : r.p.id;
          renderTourn();
        });
        table.appendChild(tr);
        if (tOpenStats === r.p.id) {
          const st = tStats(r.p.id);
          const str = document.createElement("tr");
          const td = document.createElement("td");
          td.className = "t-stats";
          td.colSpan = 5;
          td.textContent =
            "Taken: " + st.taken.head + " head \u00b7 " + st.taken.chest + " chest \u00b7 " +
            st.taken.limb + " limb \u2003 Dealt: " + st.dealt.head + " head \u00b7 " +
            st.dealt.chest + " chest \u00b7 " + st.dealt.limb + " limb";
          str.appendChild(td);
          table.appendChild(str);
        }
      });
      standings.innerHTML = "";
      standings.appendChild(table);
    }

    // bouts
    const box = $("tBouts");
    box.innerHTML = "";
    const players = state.tourn.players;
    if (players.length < 2) {
      box.innerHTML = '<div class="t-empty">Bouts appear once you have two or more players.</div>';
    } else if (state.tourn.type === "rr") {
      const playedOnce = new Set();
      state.tourn.bouts.forEach((b) => playedOnce.add(pairKey(b.aId, b.bId)));
      for (let i = 0; i < players.length; i++) {
        for (let j = i + 1; j < players.length; j++) {
          const a = players[i], b = players[j];
          const row = document.createElement("div");
          row.className = "t-pair";
          row.innerHTML = "<span>" + a.name + "</span><span class='t-vs'>VS</span><span>" + b.name + "</span>";
          const done = state.tourn.bouts.find((x) => pairKey(x.aId, x.bId) === pairKey(a.id, b.id));
          if (done) {
            const res = document.createElement("span");
            res.className = "t-res";
            const aScore = done.aId === a.id ? done.aHp : done.bHp;
            const bScore = done.aId === a.id ? done.bHp : done.aHp;
            res.textContent = aScore + "\u2013" + bScore;
            row.appendChild(res);
          } else {
            const btn = document.createElement("button");
            btn.className = "t-fight";
            btn.textContent = "Fight";
            btn.addEventListener("click", () => startTournBout(a.id, b.id));
            row.appendChild(btn);
          }
          box.appendChild(row);
        }
      }
    } else {
      // free bouts: pick any two (a fighter can never face themselves)
      const wrap = document.createElement("div");
      wrap.className = "t-selects";
      const mkSel = () => {
        const sel = document.createElement("select");
        players.forEach((p) => {
          const o = document.createElement("option");
          o.value = p.id; o.textContent = p.name;
          sel.appendChild(o);
        });
        return sel;
      };
      const selA = mkSel(), selB = mkSel();
      if (players.length > 1) selB.selectedIndex = 1;
      const vs = document.createElement("span");
      vs.className = "t-vs"; vs.textContent = "VS";
      const go = document.createElement("button");
      go.className = "t-fight"; go.textContent = "Fight";

      // Keep the two selects mutually exclusive
      function syncSelects(changed) {
        const other = changed === selA ? selB : selA;
        // If they collide, move the other select to the next available player
        if (other.value === changed.value) {
          const free = [...other.options].find((o) => o.value !== changed.value);
          if (free) other.value = free.value;
        }
        // Disable each select's option matching the other's pick
        [...selA.options].forEach((o) => { o.disabled = o.value === selB.value; });
        [...selB.options].forEach((o) => { o.disabled = o.value === selA.value; });
        go.disabled = selA.value === selB.value;
      }
      selA.addEventListener("change", () => syncSelects(selA));
      selB.addEventListener("change", () => syncSelects(selB));
      syncSelects(selA);

      go.addEventListener("click", () => {
        const a = Number(selA.value), b = Number(selB.value);
        if (a === b) return;   // belt and braces
        startTournBout(a, b);
      });
      wrap.append(selA, vs, selB, go);
      box.appendChild(wrap);
      // recent results, newest first
      [...state.tourn.bouts].reverse().slice(0, 12).forEach((b) => {
        const row = document.createElement("div");
        row.className = "t-pair";
        row.innerHTML = "<span>" + tPlayerName(b.aId) + "</span><span class='t-vs'>VS</span><span>" +
                        tPlayerName(b.bId) + "</span><span class='t-res'>" + b.aHp + "\u2013" + b.bHp + "</span>";
        box.appendChild(row);
      });
    }
  }

  /* ---------- Persistence (survives closing the app) ---------- */
  const SAVE_KEY = "duel-scorekeeper-v1";

  function save() {
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        hpStart: state.hpStart,
        fight: state.fight,
        round: state.round,
        over: state.over,
        doubleCount: state.doubleCount,
        a: state.a,
        b: state.b,
        log: state.log,
        nameA: els.nameA.value,
        nameB: els.nameB.value,
        mode: state.mode,
        tournBout: state.tournBout,
        returnPending: state.returnPending,
        tourn: state.tourn,
        fightHistory: state.fightHistory
      }));
    } catch (e) { /* storage unavailable (e.g. preview sandbox) — run in memory */ }
  }

  function load() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return;
      const s = JSON.parse(raw);
      state.hpStart = s.hpStart ?? 20;
      state.fight = s.fight ?? 1;
      state.round = s.round ?? 1;
      state.over = s.over ?? false;
      state.doubleCount = Math.min(3, Math.max(0, s.doubleCount ?? 0));
      Object.assign(state.a, s.a || {});
      Object.assign(state.b, s.b || {});
      state.log = (Array.isArray(s.log) ? s.log : []).filter((e) => e.side);
      els.nameA.value = s.nameA || "";
      els.nameB.value = s.nameB || "";
      els.hpStart.value = state.hpStart;
      state.mode = s.mode === "tourn" ? "tourn" : "duel";
      state.tournBout = s.tournBout || null;
      state.returnPending = !!s.returnPending;
      state.fightHistory = (Array.isArray(s.fightHistory) ? s.fightHistory : []).slice(0, HISTORY_CAP);
      if (s.tourn && Array.isArray(s.tourn.players)) {
        state.tourn = {
          type: s.tourn.type === "free" ? "free" : "rr",
          players: s.tourn.players,
          bouts: Array.isArray(s.tourn.bouts) ? s.tourn.bouts : [],
          nextId: s.tourn.nextId || (Math.max(0, ...s.tourn.players.map(p => p.id)) + 1)
        };
      }
    } catch (e) { /* corrupt or unavailable — start fresh */ }
  }

  els.nameA.addEventListener("input", save);
  els.nameB.addEventListener("input", save);

  /* ---------- Init ---------- */
  load();
  applyColor("a");
  applyColor("b");
  render();
  renderLog();
  renderHistory();
  setMode(state.mode);
})();
</script>
<script>
  // Offline support: register the service worker if this is running from a server
  if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>
